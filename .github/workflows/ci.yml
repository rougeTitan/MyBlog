name: CI/CD Pipeline

# Trunk-based development: runs on every push to main and on PRs targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Step 1: Style Integrity Check (Lint + Format)
  # ─────────────────────────────────────────────────────────
  style-check:
    name: Style Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check Prettier formatting
        run: pnpm format:check

      - name: TypeScript type check
        run: pnpm type-check

  # ─────────────────────────────────────────────────────────
  # Step 2: Testing & Coverage
  # ─────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: style-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # Step 3: Code Smells & Quality Analysis
  # ─────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: style-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for code smells (ESLint extended rules)
        run: pnpm lint

      - name: Check for unused dependencies
        run: |
          echo "Checking for common code quality issues..."
          # Check for console.log statements in source code (not test files)
          if grep -rn "console\.log" app/ components/ lib/ hooks/ --include="*.ts" --include="*.tsx" | grep -v "test\." | grep -v "__tests__"; then
            echo "⚠️  Warning: console.log statements found in source code"
          else
            echo "✅ No console.log statements in source code"
          fi

      - name: Check for TODO/FIXME comments
        run: |
          echo "Scanning for TODO/FIXME/HACK comments..."
          RESULTS=$(grep -rn "TODO\|FIXME\|HACK\|XXX" app/ components/ lib/ hooks/ --include="*.ts" --include="*.tsx" || true)
          if [ -n "$RESULTS" ]; then
            echo "⚠️  Technical debt markers found:"
            echo "$RESULTS"
          else
            echo "✅ No TODO/FIXME markers found"
          fi

  # ─────────────────────────────────────────────────────────
  # Step 4: Build & Deploy to AWS (only on push to main)
  # ─────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

      # ── AWS Amplify Deployment ──────────────────────────
      # AWS Amplify auto-deploys from the main branch when connected.
      # If you want explicit deployment via CLI, uncomment below and
      # add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION
      # as GitHub repository secrets.
      #
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      #
      # - name: Deploy to AWS Amplify
      #   run: |
      #     aws amplify start-job \
      #       --app-id ${{ secrets.AMPLIFY_APP_ID }} \
      #       --branch-name main \
      #       --job-type RELEASE

      - name: Deployment summary
        run: |
          echo "🚀 Build successful!"
          echo "📦 Build artifacts uploaded"
          echo "🌐 AWS Amplify will auto-deploy from the main branch"
